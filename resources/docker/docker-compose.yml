name: platform-${ACTIVE_ENV:-prod}
services:
  frontend-admin:
    container_name: frontend-admin-${ACTIVE_ENV:-prod}
    image: frontend-admin:0.0.1
    build:
      context: ../../
      dockerfile: resources/docker/Dockerfile.frontend_admin
    restart: unless-stopped
    networks:
      - default-network
  platform-backend:
    container_name: platform-backend-${ACTIVE_ENV:-prod}
    image: platform-backend:0.0.1
    build:
      context: ../../
      dockerfile: resources/docker/Dockerfile.backend
    restart: unless-stopped
    environment:
      - FORTY_APP_MYSQL_HOST: forty-mysql
      # - FORTY_APP_REDIS_HOST: forty-mysql
    networks:
      - default-network
  
  platform-nginx:
    container_name: platform-nginx-${ACTIVE_ENV:-prod}
    image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/nginx:1.18.0-alpine
    command: ["nginx", "-c", "/etc/nginx/nginx.conf", "-g", "daemon off;"]
    ports:
      - 18080:18080
    volumes:
      - ${NGINX_VOLUME_LOG:-./logs/nginx}:/var/log/nginx
      - ./nginx.conf:/etc/nginx/nginx.conf
    networks:
      - default-network
networks:
  default-network:
    external: true
    name: platform-shared-net
