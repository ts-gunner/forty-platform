  #     - ${REDIS_VOLUME_DIRECTORY:-.}:/data
  #     - ${REDIS_VOLUME_CONFIG:-./redis.conf}:/etc/redis/redis.conf
  #   command: redis-server /etc/redis/redis.conf
  #   networks:
  #     - middle-network

networks:
  middle-network:
    external: true
    name: platform-shared-net
