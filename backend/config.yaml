mysql:
    path: ${FORTY_APP_MYSQL_HOST:=127.0.0.1}
    port: "3306"
    db-name: ${FORTY_APP_MYSQL_DB:=forty_dev}
    username: ${FORTY_APP_MYSQL_USER:=root}
    password: ${FORTY_APP_MYSQL_PASSWORD:=123456}
    max-idle-conns: 10
    max-open-conns: 100

redis:
    port: "6379"
    host: ${FORTY_APP_REDIS_HOST:=127.0.0.1}
    password: ${FORTY_APP_REDIS_PASSWORD:=123456}
    db: 8

servlet:
    port: ${FORTY_APP_PORT:=18888}
    db-type: mysql
    oss-type: local
    context-path: /ft
zap:
    level: info
    prefix: '[forty-platform]'
    format: console
    director: logs
    encode-level: ""
    show-line: false
    log-in-console: true

wechat:
    app-id: ${WECHAT_APP_ID}
    app-secret: ${WECHAT_APP_SECRET}

store:
    store-type: local
    super-bed:
        enable: true
        token: ${SUPER_BED_TOKEN}
    aliyun:
        enable: false
        access-key-id: ss
        access-key-secret: dd
        access-prefix-url: 223
        base-rel-path: C://
    tencent:
        enable: false
        access-key-id: ss
        access-key-secret: dd
        access-prefix-url: 223
        base-rel-path: C://
    minio:
        enable: false
        access-prefix-url: 223
        base-rel-path: C://

